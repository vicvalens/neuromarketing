<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heatmap visual continuo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Explora la imagen</h1>
  <p>
    Mueve el mouse como si siguieras tu mirada. El sistema generará un mapa
    de calor continuo con mayor peso en zonas de permanencia.
  </p>

  <div id="wrapper">
    <img id="stimulus" src="imagen.jpg" alt="Imagen de prueba" />
    <canvas id="heatmapCanvas"></canvas>
  </div>

  <div class="controls">
    <button id="startBtn">Iniciar</button>
    <button id="showBtn">Mostrar mapa de calor</button>
    <button id="clearBtn">Limpiar</button>
    <button id="downloadBtn">Descargar datos JSON</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
